<!-- /public/thank-you/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Understanding Gurbani</title>
    <script src="https://cdn.tailwindcss.com/3.4.16"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
        theme: {
        extend: {
        colors: {
        primary: '#000000',
        secondary: '#374151'
        },
        borderRadius: {
        'none': '0px',
        'sm': '4px',
        DEFAULT: '8px',
        'md': '12px',
        'lg': '16px',
        'xl': '20px',
        '2xl': '24px',
        '3xl': '32px',
        'full': '9999px',
        'button': '8px'
        },
        fontFamily: {
        'inter': ['Inter', 'sans-serif']
        }
        }
        }
        }
    </script>
    <style>
        :where([class^="ri-"])::before {
        content: "\f3c2";
        }
        body {
        font-family: 'Inter', sans-serif;
        }
    </style>
    <script src="/thank-you/js/thank-you.js" defer></script>
</head>
<body class="bg-white text-gray-900">

  <!-- Navbar -->
    <nav class="bg-white/95 backdrop-blur-sm border-b border-gray-200 sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-6 py-4">
        <div class="flex items-center justify-between">
          <div class="text-2xl font-semibold text-gray-900">
                <a href="/"><img class="w-24 h-auto" src="../../images/logo.png" alt="Gurbani Vyakhya Logo"/></a>
            </div>
        </div>
      </div>
    </nav>

  <!-- Main Thank You Section -->
  <section class="py-20 bg-white">
    <div class="max-w-6xl mx-auto px-6 space-y-16">
      
      <!-- Initial Thank You Message -->
      <div class="text-center space-y-6">
        <h1 class="text-6xl font-light text-gray-900">
          Thank you for your generous support 🙏
        </h1>
        <p class="text-2xl text-gray-700 font-light leading-relaxed max-w-4xl mx-auto">
          Your contribution helps us continue sharing the wisdom of Gurbani, making it accessible to seekers everywhere.May your generosity bring blessings and inspiration in your own journey.
        </p>
        <div class="w-16 h-0.5 bg-black mx-auto"></div>
      </div>

    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-gray-50 border-t border-gray-200 py-12">
        <div class="max-w-6xl mx-auto px-6">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="text-gray-600 text-sm">
                    © 2026 Gurbani Vyakhya. All rights reserved.
                </div>
                <div class="flex items-center gap-8">
                    <a href="/#faqs" class="text-gray-600 hover:text-gray-900 text-sm transition-colors">FAQs</a>
                    <a href="mailto:info@gurbanivyakhya.com" class="text-gray-600 hover:text-gray-900 text-sm transition-colors">Contact</a>
                    <a href="/privacy-policy" class="text-gray-600 hover:text-gray-900 text-sm transition-colors">Privacy</a>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
